<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Your Interest</title>
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ffffff 0%, #000000 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        max-width: 500px;
        width: 100%;
        padding: 40px;
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 30px;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        color: #333;
        font-weight: bold;
        margin-bottom: 5px;
        font-size: 14px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
      }

      textarea {
        resize: vertical;
        min-height: 100px;
      }

      button {
        width: 100%;
        padding: 15px;
        background: #00bbff;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
      }

      button:hover {
        background: #5568d3;
      }

      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      .message {
        margin-top: 15px;
        padding: 10px;
        border-radius: 5px;
        text-align: center;
        display: none;
      }

      .message.success {
        background: #d4edda;
        color: #155724;
        display: block;
      }

      .message.error {
        background: #f8d7da;
        color: #721c24;
        display: block;
      }

    </style>
</head>
<body>
    <div class="container">
      <h1>Register Your Interest</h1>
      <p class="subtitle">
        Fill out the form and our team will contact you shortly.
      </p>

      <form id="leadForm">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" id="name" required />
        </div>

        <div class="form-group">
          <label>Contact Number *</label>
          <input type="tel" id="phone" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" />
        </div>

        <div class="form-group">
          <label>Product</label>
          <select id="product">
            <option value="">Select a Product</option>
            <option value="product-a">Product A</option>
            <option value="product-b">Product B</option>
            <option value="product-c">Product C</option>
          </select>
        </div>

        <div class="form-group">
          <label>Message</label>
          <textarea
            id="message"
            placeholder="Tell us about your requirements..."
          ></textarea>
        </div>

        <button type="submit" id="submitBtn">Submit Registration</button>

        <div id="statusMessage" class="message"></div>
      </form>
    </div>

    <script>
        const form = document.getElementById("leadForm");
        const submitBtn = document.getElementById("submitBtn");
        const statusMessage = document.getElementById("statusMessage");
        form.addEventListener("submit", async function (event) {
                event.preventDefault();
        
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const email = document.getElementById("email").value.trim();
        const product = document.getElementById("product").value;
        const message = document.getElementById("message").value.trim();

        if(!name || !phone){
            showMesaage("Name and Contact number are Required","error");
            return;
        }

        if(email && !isValidEmail(email)){
            showMesaage("Please Enter a Valid email","error");
            return;
        }

        const formData = {
            name: name,
            phone: phone,
            email: email,
            product: product,
            message: message,
            timestamp: new Date().toISOString(),
        };

        submitBtn.disabled = true;
        submitBtn.textContent = "Submitting..";

        try{
            const response = await fetch(
                "https://jsonplaceholder.typicode.com/posts",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(formData),
                }
            );

            if(!response.ok) {
                throw new Error("Submission Failed");
            }

            const result = await response.json();
            console.log("Success", result);

            showMessage("Registration Submitted Successfully!","success");
            form.reset();
            }catch (error) {
                console.error("Error", error);
                showMessage("Failed to Submit. Please Try agin.", "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit Registration";
            }
        });

            function showMessage(text, type){
                statusMessage.textContent = text;
                statusMessage.className = `message ${type}`;

                setTimeout(() => {
                    statusMessage.className = "message";
                }, 5000);
            }

            function isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }
    </script>    
</body>
</html>
